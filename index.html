<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skyward · Flappy Balance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #050a14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1s ease;
        }

        .game-container.theme-day {
            background: linear-gradient(145deg, #7ec8ff, #3498db);
        }

        .game-container.theme-night {
            background: linear-gradient(145deg, #0a1f2e, #1b3b4f);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            cursor: pointer;
        }

        /* HUD - Top bar */
        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .score-panel {
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
        }

        .score-number {
            color: white;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 0 15px #00aaff;
        }

        .best-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 40px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .best-label {
            color: rgba(255, 215, 0, 0.9);
            font-size: 14px;
            font-weight: 500;
        }

        .best-number {
            color: gold;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 0 15px gold;
        }

        /* Center theme indicator */
        .theme-indicator {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            color: white;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .theme-icon {
            font-size: 18px;
        }

        /* Pause button - top right */
        .pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
        }

        .pause-btn:hover {
            transform: scale(1.1);
            border-color: white;
        }

        .pause-icon {
            color: white;
            font-size: 22px;
        }

        /* Upload section - bottom left */
        .upload-section {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: all;
        }

        .upload-btn {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            pointer-events: all;
        }

        .upload-btn:hover {
            background: rgba(30, 50, 80, 0.9);
            border-color: #80c0ff;
            transform: scale(1.05);
        }

        .upload-btn:active {
            transform: scale(0.98);
        }

        .upload-btn input {
            display: none;
        }

        .file-name {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 8px 18px;
            color: #a0d0ff;
            font-size: 14px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* Menu Screen */
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .menu-card {
            background: rgba(20, 30, 45, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 50px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .game-title {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #aad0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .game-sub {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .start-btn {
            background: linear-gradient(135deg, #4a90e2, #2c6cb0);
            border: none;
            padding: 15px 50px;
            border-radius: 40px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(0, 100, 255, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 150, 255, 0.6);
        }

        .instructions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .instruction {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 14px;
        }

        .key {
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 10px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Game Over Screen */
        .gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        .gameover-card {
            background: rgba(30, 20, 25, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #ff5555;
            border-radius: 40px;
            padding: 40px 50px;
            text-align: center;
            animation: fadeIn 0.4s;
        }

        .gameover-title {
            font-size: 48px;
            font-weight: 900;
            color: #ff6b6b;
            text-shadow: 0 0 25px #ff0000;
            margin-bottom: 15px;
        }

        .final-score-box {
            font-size: 24px;
            color: white;
            margin: 15px 0;
        }

        .final-score-box span {
            color: gold;
            font-size: 40px;
            font-weight: 800;
            margin-left: 10px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            border: none;
            padding: 15px 45px;
            border-radius: 40px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin: 20px 0 15px;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ff5555;
        }

        /* Pause Indicator */
        .pause-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 12px 30px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .pause-indicator.show {
            opacity: 1;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .score-panel, .best-panel { padding: 6px 15px; }
            .score-number, .best-number { font-size: 24px; }
            .theme-indicator { padding: 4px 15px; font-size: 14px; }
            .pause-btn { width: 42px; height: 42px; }
            .upload-btn { padding: 8px 16px; font-size: 14px; }
            .file-name { max-width: 120px; font-size: 12px; padding: 6px 12px; }
            .game-title { font-size: 42px; }
            .menu-card { padding: 30px; }
            .gameover-card { padding: 30px; }
            .gameover-title { font-size: 40px; }
            .final-score-box span { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="game-container theme-day" id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD (Top) -->
        <div class="hud">
            <div class="score-panel">
                <span class="score-label">SCORE</span>
                <span class="score-number" id="scoreDisplay">0</span>
            </div>
            <div class="best-panel">
                <span class="best-label">BEST</span>
                <span class="best-number" id="highScoreDisplay">0</span>
            </div>
        </div>

        <!-- Theme Indicator (Center Top) -->
        <div class="theme-indicator" id="themeIndicator">
            <span class="theme-icon" id="themeIcon">☀️</span>
            <span id="themeText">DAY</span>
        </div>

        <!-- Pause Button (Top Right) -->
        <div class="pause-btn" id="pauseButton">
            <span class="pause-icon" id="pauseIcon">⏸️</span>
        </div>

        <!-- Upload Section (Bottom Left) -->
        <div class="upload-section">
            <label class="upload-btn" id="uploadLabel">
                <span>🖼️</span>
                <span>UPLOAD BIRD</span>
                <input type="file" id="birdUpload" accept="image/png">
            </label>
            <div class="file-name" id="fileNameDisplay">default bird.png</div>
        </div>

        <!-- Menu Screen -->
        <div class="menu-screen" id="menuScreen">
            <div class="menu-card">
                <h1 class="game-title">SKYWARD</h1>
                <p class="game-sub">FLAPPY BALANCE</p>
                <button class="start-btn" id="startBtn">START</button>
                <div class="instructions">
                    <div class="instruction"><span class="key">␣</span> TAP / SPACE</div>
                    <div class="instruction"><span class="key">ESC</span> PAUSE</div>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="gameover-screen" id="gameoverScreen">
            <div class="gameover-card">
                <h1 class="gameover-title">GAME OVER</h1>
                <div class="final-score-box">
                    SCORE <span id="finalScore">0</span>
                </div>
                <div class="final-score-box">
                    BEST <span id="finalBest">0</span>
                </div>
                <button class="restart-btn" id="restartBtn">PLAY AGAIN</button>
                <div class="instruction"><span class="key">␣</span> RESTART</div>
            </div>
        </div>

        <!-- Pause Indicator -->
        <div class="pause-indicator" id="pauseIndicator">⏸ PAUSED</div>
    </div>

    <script>
        (function() {
            // ==================== কনফিগারেশন ====================
            const CONFIG = {
                GRAVITY: 0.25,
                FLAP_FORCE: -6.0,
                MAX_VELOCITY: 9,
                PIPE_SPEED: 2.5,
                PIPE_WIDTH: 70,
                PIPE_GAP: 200,
                PIPE_SPACING: 400,
                BIRD_SIZE: 28,
                BIRD_X: 120,
                GROUND_HEIGHT: 80,
                CEILING: 50,
                THEME_CHANGE: 20
            };

            // DOM Elements
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('gameContainer');
            
            // Display Elements
            const scoreDisplay = document.getElementById('scoreDisplay');
            const highScoreDisplay = document.getElementById('highScoreDisplay');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            const pauseIcon = document.getElementById('pauseIcon');
            
            // Buttons & Screens
            const pauseButton = document.getElementById('pauseButton');
            const menuScreen = document.getElementById('menuScreen');
            const gameoverScreen = document.getElementById('gameoverScreen');
            const pauseIndicator = document.getElementById('pauseIndicator');
            const startBtn = document.getElementById('startBtn');
            const restartBtn = document.getElementById('restartBtn');
            
            // Upload Elements
            const birdUpload = document.getElementById('birdUpload');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            
            const finalScore = document.getElementById('finalScore');
            const finalBest = document.getElementById('finalBest');

            // Game State
            let gameActive = false;
            let gamePaused = false;
            let score = 0;
            let highScore = localStorage.getItem('flappyHighScore') ? parseInt(localStorage.getItem('flappyHighScore')) : 0;
            let currentTheme = 'day';
            
            // Bird
            let bird = {
                y: 300,
                velocity: 0,
                rotation: 0
            };
            
            // Game Objects
            let pipes = [];
            let trees = [];
            let clouds = [];
            let grass = [];
            let customBird = null;
            
            // Animation
            let animationId = null;
            
            // Canvas Dimensions
            let canvasWidth = window.innerWidth;
            let canvasHeight = window.innerHeight;
            
            // Initialize High Score
            highScoreDisplay.textContent = highScore;

            // ==================== ক্যানভাস রিসাইজ ====================
            function resizeCanvas() {
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                
                // রিসাইজের সময় বার্ডের পজিশন ঠিক রাখা
                if (bird) {
                    bird.y = Math.min(bird.y, canvasHeight - CONFIG.GROUND_HEIGHT - CONFIG.BIRD_SIZE/2);
                    bird.y = Math.max(bird.y, CONFIG.CEILING + CONFIG.BIRD_SIZE/2);
                }
                
                createEnvironment();
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ==================== ন্যাচারাল এনভায়রনমেন্ট ====================
            function createEnvironment() {
                trees = [];
                for (let i = 0; i < 6; i++) {
                    trees.push({
                        x: 150 + i * (canvasWidth / 5),
                        y: canvasHeight - CONFIG.GROUND_HEIGHT - 100,
                        width: 20 + Math.random() * 15,
                        height: 120 + Math.random() * 60
                    });
                }
                
                grass = [];
                for (let i = 0; i < 50; i++) {
                    grass.push({
                        x: Math.random() * canvasWidth,
                        height: 15 + Math.random() * 25,
                        angle: Math.random() * 0.5 - 0.25
                    });
                }
                
                clouds = [];
                for (let i = 0; i < 5; i++) {
                    clouds.push({
                        x: Math.random() * canvasWidth,
                        y: 50 + Math.random() * 150,
                        size: 40 + Math.random() * 60,
                        speed: 0.1 + Math.random() * 0.2
                    });
                }
            }

            // Drawing functions
            function drawTrees() {
                trees.forEach(tree => {
                    ctx.fillStyle = '#8B5A2B';
                    ctx.shadowColor = '#4A3A1A';
                    ctx.shadowBlur = 15;
                    ctx.fillRect(tree.x - tree.width/2, tree.y, tree.width, tree.height);
                    
                    ctx.fillStyle = '#2E7D32';
                    ctx.shadowColor = '#1B5E20';
                    ctx.shadowBlur = 20;
                    
                    ctx.beginPath();
                    ctx.ellipse(tree.x, tree.y - 20, 30, 25, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#4CAF50';
                    ctx.beginPath();
                    ctx.ellipse(tree.x - 10, tree.y - 35, 25, 20, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.ellipse(tree.x + 15, tree.y - 30, 25, 20, 0, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawGrass() {
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#2E7D32';
                
                grass.forEach(g => {
                    const gradient = ctx.createLinearGradient(
                        g.x, canvasHeight - CONFIG.GROUND_HEIGHT,
                        g.x + 10, canvasHeight - CONFIG.GROUND_HEIGHT - g.height
                    );
                    gradient.addColorStop(0, '#4CAF50');
                    gradient.addColorStop(1, '#2E7D32');
                    
                    ctx.beginPath();
                    ctx.moveTo(g.x, canvasHeight - CONFIG.GROUND_HEIGHT);
                    ctx.lineTo(g.x + 8, canvasHeight - CONFIG.GROUND_HEIGHT - g.height);
                    ctx.lineTo(g.x - 8, canvasHeight - CONFIG.GROUND_HEIGHT - g.height/2);
                    ctx.closePath();
                    
                    ctx.fillStyle = gradient;
                    ctx.fill();
                });
            }

            function drawClouds() {
                clouds.forEach(cloud => {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
                    ctx.shadowBlur = 25;
                    
                    for (let i = 0; i < 4; i++) {
                        ctx.beginPath();
                        ctx.arc(
                            cloud.x + i * 25, 
                            cloud.y + Math.sin(i) * 10, 
                            cloud.size - i * 8, 
                            0, Math.PI * 2
                        );
                        ctx.fill();
                    }
                    
                    cloud.x += cloud.speed;
                    if (cloud.x > canvasWidth + 100) {
                        cloud.x = -100;
                    }
                });
            }

            function drawGround() {
                const groundY = canvasHeight - CONFIG.GROUND_HEIGHT;
                
                const gradient = ctx.createLinearGradient(0, groundY, 0, canvasHeight);
                gradient.addColorStop(0, '#5D8C4E');
                gradient.addColorStop(1, '#2D4A2D');
                
                ctx.fillStyle = gradient;
                ctx.shadowBlur = 10;
                ctx.fillRect(0, groundY, canvasWidth, CONFIG.GROUND_HEIGHT);
            }

            // ==================== থিম সেট ====================
            function setTheme(theme) {
                currentTheme = theme;
                container.className = `game-container theme-${theme}`;
                themeIcon.textContent = theme === 'day' ? '☀️' : '🌙';
                themeText.textContent = theme === 'day' ? 'DAY' : 'NIGHT';
            }

            // ==================== গেম ফাংশন ====================
            function resetGame() {
                gameActive = true;
                gamePaused = false;
                score = 0;
                bird.y = canvasHeight / 2;
                bird.velocity = 0;
                pipes = [];
                setTheme('day');
                scoreDisplay.textContent = '0';
                menuScreen.style.display = 'none';
                gameoverScreen.style.display = 'none';
                pauseIndicator.classList.remove('show');
                pauseIcon.textContent = '⏸️';
                createPipe();
            }

            function gameOver() {
                gameActive = false;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('flappyHighScore', highScore);
                    highScoreDisplay.textContent = highScore;
                }
                finalScore.textContent = score;
                finalBest.textContent = highScore;
                gameoverScreen.style.display = 'flex';
            }

            function flap() {
                if (gameActive && !gamePaused) {
                    bird.velocity = CONFIG.FLAP_FORCE;
                }
            }

            function createPipe() {
                if (!gameActive) return;
                
                const groundY = canvasHeight - CONFIG.GROUND_HEIGHT;
                const topMargin = CONFIG.CEILING + 50;
                const bottomMargin = groundY - 50;
                const availableHeight = bottomMargin - topMargin - CONFIG.PIPE_GAP;
                
                let randomFactor = Math.random();
                let centerBias = 0.3 + (randomFactor * 0.4);
                let topHeight = topMargin + (availableHeight * centerBias);
                topHeight = Math.max(topMargin, Math.min(bottomMargin - CONFIG.PIPE_GAP, topHeight));
                
                pipes.push({
                    x: canvasWidth,
                    top: topHeight,
                    bottom: topHeight + CONFIG.PIPE_GAP,
                    passed: false,
                    width: CONFIG.PIPE_WIDTH
                });
            }

            // ==================== গেম আপডেট ====================
            function update() {
                if (!gameActive || gamePaused) return;

                bird.velocity += CONFIG.GRAVITY;
                bird.velocity = Math.min(bird.velocity, CONFIG.MAX_VELOCITY);
                bird.y += bird.velocity;
                bird.rotation = Math.min(Math.max(bird.velocity * 0.08, -0.4), 0.6);

                if (bird.y + CONFIG.BIRD_SIZE/2 > canvasHeight - CONFIG.GROUND_HEIGHT) {
                    gameOver();
                    return;
                }
                
                if (bird.y - CONFIG.BIRD_SIZE/2 < CONFIG.CEILING) {
                    bird.y = CONFIG.CEILING + CONFIG.BIRD_SIZE/2;
                    bird.velocity = 0;
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    const p = pipes[i];
                    p.x -= CONFIG.PIPE_SPEED;

                    if (!p.passed && p.x + p.width < CONFIG.BIRD_X) {
                        p.passed = true;
                        score++;
                        scoreDisplay.textContent = score;
                        
                        if (score % CONFIG.THEME_CHANGE === 0) {
                            setTheme(currentTheme === 'day' ? 'night' : 'day');
                        }
                        
                        if (score > highScore) {
                            highScore = score;
                            highScoreDisplay.textContent = highScore;
                        }
                    }

                    if (p.x + p.width < 0) {
                        pipes.splice(i, 1);
                        continue;
                    }

                    if (CONFIG.BIRD_X + CONFIG.BIRD_SIZE/2 > p.x && 
                        CONFIG.BIRD_X - CONFIG.BIRD_SIZE/2 < p.x + p.width) {
                        if (bird.y - CONFIG.BIRD_SIZE/2 < p.top || 
                            bird.y + CONFIG.BIRD_SIZE/2 > p.bottom) {
                            gameOver();
                            return;
                        }
                    }
                }

                if (pipes.length === 0 || pipes[pipes.length - 1].x < canvasWidth - CONFIG.PIPE_SPACING) {
                    createPipe();
                }
            }

            // ==================== ড্র ফাংশন ====================
            function draw() {
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);

                const gradient = ctx.createLinearGradient(0, 0, 0, canvasHeight);
                if (currentTheme === 'day') {
                    gradient.addColorStop(0, '#87CEEB');
                    gradient.addColorStop(0.5, '#B0E0E6');
                    gradient.addColorStop(1, '#D4F1F9');
                } else {
                    gradient.addColorStop(0, '#0A1F3A');
                    gradient.addColorStop(0.5, '#1B3B4F');
                    gradient.addColorStop(1, '#143B4E');
                }
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                drawClouds();
                drawTrees();
                drawGround();
                drawGrass();

                pipes.forEach(p => {
                    ctx.fillStyle = '#4CAF50';
                    ctx.shadowColor = '#2E7D32';
                    ctx.shadowBlur = 15;
                    ctx.fillRect(p.x, 0, p.width, p.top);
                    ctx.fillRect(p.x, p.bottom, p.width, canvasHeight - p.bottom - CONFIG.GROUND_HEIGHT);
                    
                    ctx.fillStyle = '#8B5A2B';
                    ctx.fillRect(p.x - 5, p.top - 25, p.width + 10, 25);
                    ctx.fillRect(p.x - 5, p.bottom, p.width + 10, 25);
                });

                ctx.save();
                ctx.translate(CONFIG.BIRD_X, bird.y);
                ctx.rotate(bird.rotation);
                ctx.shadowColor = '#F39C12';
                ctx.shadowBlur = 20;
                
                if (customBird) {
                    ctx.drawImage(customBird, -CONFIG.BIRD_SIZE, -CONFIG.BIRD_SIZE, CONFIG.BIRD_SIZE * 2, CONFIG.BIRD_SIZE * 2);
                } else {
                    ctx.fillStyle = '#F1C40F';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, CONFIG.BIRD_SIZE/1.5, CONFIG.BIRD_SIZE/1.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#E67E22';
                    ctx.beginPath();
                    ctx.ellipse(-8, -3, 8, 12, 0.1, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(7, -7, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#1E1E2F';
                    ctx.beginPath();
                    ctx.arc(9, -9, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                if (gamePaused && gameActive) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                }
            }

            // ==================== গেম লুপ ====================
            function gameLoop() {
                update();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }

            // ==================== ইভেন্ট হ্যান্ডলার ====================
            function handleKeyDown(e) {
                if (e.code === 'Space' || e.key === ' ') {
                    e.preventDefault();
                    if (!gameActive) {
                        if (gameoverScreen.style.display === 'flex') {
                            resetGame();
                        } else if (menuScreen.style.display !== 'none') {
                            resetGame();
                        }
                    } else {
                        flap();
                    }
                } else if (e.code === 'Escape' && gameActive) {
                    e.preventDefault();
                    gamePaused = !gamePaused;
                    pauseIndicator.classList.toggle('show', gamePaused);
                    pauseIcon.textContent = gamePaused ? '▶️' : '⏸️';
                }
            }

            function handleClick(e) {
                e.preventDefault();
                if (!gameActive) {
                    if (gameoverScreen.style.display === 'flex') {
                        resetGame();
                    } else if (menuScreen.style.display !== 'none') {
                        resetGame();
                    }
                } else {
                    flap();
                }
            }

            function handlePauseClick(e) {
                e.preventDefault();
                e.stopPropagation();
                if (gameActive) {
                    gamePaused = !gamePaused;
                    pauseIndicator.classList.toggle('show', gamePaused);
                    pauseIcon.textContent = gamePaused ? '▶️' : '⏸️';
                }
            }

            // ==================== আপলোড হ্যান্ডলার - ফিক্সড ====================
            if (birdUpload) {
                birdUpload.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    
                    if (file) {
                        // শুধু PNG ফাইল চেক
                        if (file.type !== 'image/png') {
                            alert('Please select a PNG image file only!');
                            birdUpload.value = '';
                            fileNameDisplay.textContent = 'default bird.png';
                            return;
                        }
                        
                        // ফাইল সাইজ চেক সরানো হয়েছে - এখন যেকোনো সাইজের PNG কাজ করবে
                        
                        const reader = new FileReader();
                        
                        reader.onload = function(event) {
                            const img = new Image();
                            
                            img.onload = function() {
                                customBird = img;
                                
                                // ফাইলের নাম ছোট করে দেখান
                                let shortName = file.name;
                                if (shortName.length > 20) {
                                    shortName = shortName.substring(0, 17) + '...';
                                }
                                fileNameDisplay.textContent = shortName;
                                
                                alert('Bird image uploaded successfully!');
                            };
                            
                            img.onerror = function() {
                                alert('Failed to load image. Please try another PNG file.');
                                customBird = null;
                                fileNameDisplay.textContent = 'default bird.png';
                                birdUpload.value = '';
                            };
                            
                            img.src = event.target.result;
                        };
                        
                        reader.onerror = function() {
                            alert('Error reading file. Please try again.');
                            customBird = null;
                            fileNameDisplay.textContent = 'default bird.png';
                            birdUpload.value = '';
                        };
                        
                        reader.readAsDataURL(file);
                    } else {
                        customBird = null;
                        fileNameDisplay.textContent = 'default bird.png';
                    }
                });
            }

            // ইভেন্ট লিসেনার
            document.addEventListener('keydown', handleKeyDown);
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleClick, { passive: false });
            pauseButton.addEventListener('click', handlePauseClick);
            pauseButton.addEventListener('touchstart', handlePauseClick, { passive: false });
            
            startBtn.addEventListener('click', (e) => {
                e.preventDefault();
                resetGame();
            });
            
            restartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                resetGame();
            });

            // স্ক্রল প্রতিরোধ
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') e.preventDefault();
            });

            // টাচ স্ক্রল প্রতিরোধ
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });

            // ইনিশিয়ালাইজ
            createEnvironment();
            gameLoop();
        })();
    </script>
</body>
</html>
